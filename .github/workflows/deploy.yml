name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Weekly safety-net rebuild. data/ refreshes land via the sync-data
  # workflow (which opens PRs that, once merged, trigger push:main here);
  # this cron catches the case where nothing pushed but we still want a
  # rebuild after a race weekend. Monday 08:00 UTC is after every Sunday
  # race finishes in every timezone.
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Don't cancel in-progress runs — a half-
# deployed GH Pages site is worse than a delayed one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        # Repo is `paddock`, so GitHub Pages serves at /paddock/.
        # Vite's `base` and the rogue runtime router both honor this via
        # the BASE_PATH env var (see vite.config.js).
        env:
          BASE_PATH: /paddock/
        run: pnpm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
